services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${MLB_DB_NAME:-sandy}
      POSTGRES_USER: ${MLB_DB_USER:-sandy}
      POSTGRES_PASSWORD: ${MLB_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - sandy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sandy_pgdata:
